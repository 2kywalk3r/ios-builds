name: Compile iOS IPA
on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Nombre de la aplicación'
        required: true
        default: 'MiApp'
      bundle_id:
        description: 'ID del bundle iOS'
        required: true
        default: 'com.appcompiler.app'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Run Build Script
        run: |
          chmod +x build_script.sh
          ./build_script.sh "${{ github.event.inputs.app_name }}" "${{ github.event.inputs.bundle_id }}"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-ipa
          path: output/*.ipa
