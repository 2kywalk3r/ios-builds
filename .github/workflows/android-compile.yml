name: Compile Android APK
on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Nombre de la aplicación'
        required: true
        default: 'MiApp'
      bundle_id:
        description: 'ID de la aplicación'
        required: true
        default: 'com.appcompiler.web'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run Build Script
        run: |
          chmod +x build_script_android.sh
          ./build_script_android.sh "${{ github.event.inputs.app_name }}" "${{ github.event.inputs.bundle_id }}"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-apk
          path: app_output/*.apk
